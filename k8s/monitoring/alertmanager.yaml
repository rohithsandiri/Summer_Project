global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service', 'namespace']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-slack'
  routes:
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true
    - match:
        severity: warning
      receiver: 'slack-warnings'

inhibit_rules:
  - source_match:
      alertname: 'ServiceDown'
    target_match:
      severity: 'warning'
    equal: ['service', 'namespace']
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service', 'namespace']

receivers:
  - name: 'default-slack'
    slack_configs:
      - channel: '#alerts-general'
        # Set SLACK_WEBHOOK_GENERAL in the alertmanager-secret Kubernetes Secret
        api_url: '${SLACK_WEBHOOK_GENERAL}'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'

  - name: 'slack-warnings'
    slack_configs:
      - channel: '#alerts-warnings'
        # Set SLACK_WEBHOOK_WARNINGS in the alertmanager-secret Kubernetes Secret
        api_url: '${SLACK_WEBHOOK_WARNINGS}'
        send_resolved: true
        title: '[WARNING] {{ .CommonAnnotations.summary }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: 'SEC_KEY_PAGERDUTY_CRITICAL'
        send_resolved: true
        severity: 'critical'
        client: 'Alertmanager'
        description: '{{ .CommonAnnotations.summary }}: {{ .CommonAnnotations.description }}'
