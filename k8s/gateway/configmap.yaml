apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: cloud-native-platform
data:
  GATEWAY_PORT: "8000"
  LOG_LEVEL: "info"
  READ_TIMEOUT: "30s"
  WRITE_TIMEOUT: "30s"
  ORDER_SERVICE_URL: "http://order-service:8080"
  INVENTORY_SERVICE_URL: "http://inventory-service:8081"
  PAYMENT_SERVICE_URL: "http://payment-service:8082"
  RATE_LIMIT_RPS: "15.0"
  RATE_LIMIT_BURST: "30"
  OTEL_EXPORTER_OTLP_ENDPOINT: "tempo:4318"
