# .github/workflows/ci.yml
#
# Comprehensive Enterprise CI/CD Pipeline for the Self-Healing Platform.
# Fulfills Phase 9 Requirements: CI, lint, security scans, SBOM, container scans, and release prep.

name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  security-events: write
  packages: write

jobs:
  validate:
    name: Code Quality & Security Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Check Go Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted properly:"
            gofmt -l .
            exit 1
          fi

      - name: Go Vet
        run: go vet ./...

      - name: Install Govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run Govulncheck (Vulnerability Analysis)
        run: govulncheck ./...

      - name: Run Gosec (AST Security Analysis)
        uses: securego/gosec@master
        with:
          args: ./...

      - name: Run Unit Tests (with Race Detector)
        run: go test -race -v -coverprofile=coverage.txt -covermode=atomic ./...

  helm-validate:
    name: Helm Charts Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Helm Lint
        run: |
          helm lint ./helm/cloud-native-platform
          helm lint ./helm/self-healing-operator

  container-build:
    name: Secure Container Build & Security Scan
    runs-on: ubuntu-latest
    needs: [validate, helm-validate]
    strategy:
      matrix:
        service: [order-service, payment-service, inventory-service, gateway, operator]
        include:
          - service: order-service
            dockerfile: services/order-service/Dockerfile
          - service: payment-service
            dockerfile: services/payment-service/Dockerfile
          - service: inventory-service
            dockerfile: services/inventory-service/Dockerfile
          - service: gateway
            dockerfile: services/gateway/Dockerfile
          - service: operator
            dockerfile: operator/Dockerfile
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.service }}:${{ github.sha }}
          outputs: type=docker,dest=/tmp/${{ matrix.service }}.tar

      - name: Load Docker Image
        run: docker load --input /tmp/${{ matrix.service }}.tar

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM (Software Bill of Materials)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.service }}:${{ github.sha }}
          output-file: /tmp/${{ matrix.service }}-sbom.spdx.json

  release:
    name: Release Automation
    runs-on: ubuntu-latest
    needs: [container-build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/order-service-linux-amd64 ./cmd/order-service
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/payment-service-linux-amd64 ./cmd/payment-service
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/inventory-service-linux-amd64 ./cmd/inventory-service
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/api-gateway-linux-amd64 ./cmd/gateway
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/self-healing-operator-linux-amd64 ./cmd/operator

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
