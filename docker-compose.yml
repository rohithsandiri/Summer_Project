# docker-compose.yml
#
# PHASE 3 CLOUD-NATIVE ARCHITECTURE:
#   - Exposes public endpoint through Gateway on port 8000.
#   - Adds Redis (port 6379) for caching and request idempotency.
#   - Adds Jaeger (ports 16686 and 4318) for distributed tracing visualization.
#   - Passes Redis connection strings and OTel exporter endpoints.

version: "3.9"

services:

  # ─── Redis (Cache and Idempotency Store) ────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - microservices-net
    restart: unless-stopped

  # ─── Jaeger (OTel Distributed Tracing Collector & UI) ──────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: jaeger
    ports:
      - "16686:16686" # Web UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - microservices-net
    restart: unless-stopped

  # ─── Inventory Service ──────────────────────────────────────────────────────
  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: inventory-service
    ports:
      - "8081:8081"
    environment:
      PORT:                        "8081"
      SERVICE_NAME:                "inventory-service"
      SERVICE_VERSION:             "0.3.0"
      LOG_LEVEL:                   "info"
      READ_TIMEOUT:                "15s"
      WRITE_TIMEOUT:               "15s"
      REDIS_URL:                   "redis:6379"
      REDIS_PASSWORD:              ""
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4318"
      # Chaos knobs
      ERROR_RATE:                  "0.0"
      LATENCY_MS:                  "0"
    networks:
      - microservices-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8081/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Payment Service ────────────────────────────────────────────────────────
  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8082:8082"
    environment:
      PORT:                        "8082"
      SERVICE_NAME:                "payment-service"
      SERVICE_VERSION:             "0.3.0"
      LOG_LEVEL:                   "info"
      READ_TIMEOUT:                "15s"
      WRITE_TIMEOUT:               "15s"
      REDIS_URL:                   "redis:6379"
      REDIS_PASSWORD:              ""
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4318"
      PAYMENT_FAILURE_RATE:        "0.0"
      ERROR_RATE:                  "0.0"
      LATENCY_MS:                  "0"
    networks:
      - microservices-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8082/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Order Service (Orchestrator) ───────────────────────────────────────────
  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: order-service
    ports:
      - "8080:8080"
    environment:
      PORT:                        "8080"
      SERVICE_NAME:                "order-service"
      SERVICE_VERSION:             "0.3.0"
      LOG_LEVEL:                   "info"
      READ_TIMEOUT:                "30s"
      WRITE_TIMEOUT:               "30s"
      INVENTORY_SERVICE_URL:       "http://inventory-service:8081"
      PAYMENT_SERVICE_URL:         "http://payment-service:8082"
      REDIS_URL:                   "redis:6379"
      REDIS_PASSWORD:              ""
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4318"
      ERROR_RATE:                  "0.0"
      LATENCY_MS:                  "0"
    networks:
      - microservices-net
    depends_on:
      redis:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── API Gateway (Single Public Entry Point) ────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8000:8000"
    environment:
      GATEWAY_PORT:                "8000"
      SERVICE_NAME:                "api-gateway"
      SERVICE_VERSION:             "0.3.0"
      LOG_LEVEL:                   "info"
      READ_TIMEOUT:                "30s"
      WRITE_TIMEOUT:               "30s"
      ORDER_SERVICE_URL:           "http://order-service:8080"
      INVENTORY_SERVICE_URL:       "http://inventory-service:8081"
      PAYMENT_SERVICE_URL:         "http://payment-service:8082"
      RATE_LIMIT_RPS:              "15.0"
      RATE_LIMIT_BURST:            "30"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4318"
    networks:
      - microservices-net
    depends_on:
      jaeger:
        condition: service_started
      order-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

networks:
  microservices-net:
    driver: bridge
